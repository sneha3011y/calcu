<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>To-Do List App</title>
  <link rel="stylesheet" href="todo-styles.css">
</head>
<body>
  <div class="container">
    <div class="todo-app">
      <div class="header">
        <h1>📝 My Tasks</h1>
        <p class="subtitle">Stay organized and productive</p>
      </div>

      <div class="input-section">
        <div class="input-wrapper">
          <input 
            type="text" 
            id="taskInput" 
            class="task-input" 
            placeholder="Add a new task..."
            autocomplete="off"
          />
          <button id="addBtn" class="add-btn">Add Task</button>
        </div>
      </div>

      <div class="filters">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="active">Active</button>
        <button class="filter-btn" data-filter="completed">Completed</button>
      </div>

      <div class="tasks-section">
        <ul id="taskList" class="task-list"></ul>
        <div id="emptyState" class="empty-state">
          <p>🎯 No tasks yet. Add one to get started!</p>
        </div>
      </div>

      <div class="stats">
        <span class="stat-item">Total: <strong id="totalCount">0</strong></span>
        <span class="stat-item">Active: <strong id="activeCount">0</strong></span>
        <span class="stat-item">Completed: <strong id="completedCount">0</strong></span>
      </div>

      <div class="actions">
        <button id="clearCompleted" class="action-btn clear-btn">Clear Completed</button>
        <button id="clearAll" class="action-btn delete-btn">Clear All</button>
      </div>
    </div>
  </div>

  <script src="todo-script.js"></script>
</body>
</html>
